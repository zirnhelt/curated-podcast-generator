name: Refresh HTML Pages

on:
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: write

jobs:
  refresh-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate index.html
        run: python generate_html.py

      - name: Copy files to output directory
        run: |
          mkdir -p output/podcasts

          # Copy generated HTML pages
          cp index.html output/
          cp cariboo-saturday.html output/
          cp cariboo-sunday.html output/
          cp bespoke.html output/
          cp cariboo-weekends.html output/

          # Copy static assets
          cp cariboo-signals.png output/

          echo "Files ready for deployment:"
          ls -la output/

      - name: Sync HTML pages to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          BUCKET="cariboo-signals"
          echo "Syncing HTML pages to R2..."

          for page in index.html cariboo-saturday.html cariboo-sunday.html bespoke.html cariboo-weekends.html; do
            [ -f "$page" ] && aws s3 cp "$page" "s3://${BUCKET}/${page}" \
              --content-type "text/html" \
              --cache-control "no-cache" \
              && echo "  uploaded $page"
          done

          echo "R2 sync complete"
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: 'Refresh HTML pages - ${{ github.run_id }}'
