name: Refresh HTML Pages

on:
  workflow_dispatch:  # Manual trigger only

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  refresh-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Regenerate index.html
        run: python generate_html.py

      - name: Copy files to output directory
        run: |
          mkdir -p output/podcasts

          # Copy generated HTML pages
          cp index.html output/
          cp bespoke.html output/

          # Copy static assets — all cover images referenced by the HTML pages
          cp cariboo-signals.png output/
          cp cariboo-saturday.png output/ 2>/dev/null || true
          cp cariboo-sunday.png output/ 2>/dev/null || true
          cp Deepdives.png output/ 2>/dev/null || true
          cp car-sig-favicon.png output/ 2>/dev/null || true

          echo "Files ready for deployment:"
          ls -la output/

      - name: Sync HTML pages to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          BUCKET="cariboo-signals"
          echo "Syncing HTML pages to R2..."

          for page in index.html bespoke.html; do
            [ -f "$page" ] && aws s3 cp "$page" "s3://${BUCKET}/${page}" \
              --content-type "text/html" \
              --cache-control "no-cache" \
              && echo "  uploaded $page"
          done

          for img in cariboo-signals.png cariboo-saturday.png cariboo-sunday.png Deepdives.png car-sig-favicon.png; do
            [ -f "$img" ] && aws s3 cp "$img" "s3://${BUCKET}/${img}" \
              --content-type "image/png" \
              --cache-control "public, max-age=86400" \
              && echo "  uploaded $img"
          done

          echo "R2 sync complete"
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: 'Refresh HTML pages - ${{ github.run_id }}'
