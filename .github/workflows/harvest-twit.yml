name: Harvest TWIT Inspiration

on:
  schedule:
    # Sundays at 06:00 UTC (10 PM Saturday Pacific) — ahead of Monday's podcast
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      max_episodes:
        description: 'Max episodes to process per feed (0 = use config default of 8)'
        required: false
        default: '0'
        type: string
      dry_run:
        description: 'Dry run — print extraction without saving'
        required: false
        default: false
        type: boolean

concurrency:
  group: harvest-twit
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Download existing inspiration cache from GitHub Pages
        run: |
          mkdir -p podcasts
          wget https://zirnhelt.github.io/curated-podcast-generator/podcasts/twit_inspiration.json \
            -O podcasts/twit_inspiration.json \
            && echo "✅ Downloaded existing cache" \
            || echo "ℹ️  No existing cache — starting fresh"
        continue-on-error: true

      - name: Run TWIT harvest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_EP: ${{ github.event.inputs.max_episodes || '0' }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        run: |
          ARGS=""
          [ "$MAX_EP" != "0" ] && ARGS="$ARGS --max-episodes $MAX_EP"
          [ -n "$DRY_RUN" ]    && ARGS="$ARGS --dry-run"

          python twit_harvest.py $ARGS

      - name: Commit updated inspiration cache
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcasts/twit_inspiration.json
          git diff --staged --quiet \
            && echo "No new entries to commit" \
            || git commit -m "Weekly TWIT inspiration harvest — $(date -u '+%Y-%m-%d')"
          git push origin HEAD
        continue-on-error: true
