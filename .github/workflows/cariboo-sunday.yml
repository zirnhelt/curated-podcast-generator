name: Cariboo Sunday Morning Show

on:
  schedule:
    # Every Sunday at 5:00 AM Pacific Time
    # 5:00 AM PDT = 12:00 UTC (Mar–Nov)
    # 5:00 AM PST = 13:00 UTC (Nov–Mar)
    # Using 12:00 UTC year-round (will run at 6 AM in PST winter)
    - cron: '0 12 * * 0'
  workflow_dispatch:   # Manual trigger from GitHub Actions UI
    inputs:
      dry_run:
        description: 'Dry run only (check feeds, no download/assembly)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-cariboo-sunday:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install boto3

      - name: Generate Cariboo Sunday Morning show
        env:
          JAMENDO_CLIENT_ID: ${{ secrets.JAMENDO_CLIENT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "=== Cariboo Sunday Morning Generator ==="
          echo "Run date: $(TZ='America/Vancouver' date)"
          echo "Dry run: ${{ inputs.dry_run || 'false' }}"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python cariboo_sunday.py --dry-run
          else
            python cariboo_sunday.py
          fi

      - name: List output file
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          echo "Generated files:"
          ls -lh podcasts/cariboo_sunday_*.mp3 2>/dev/null || echo "No output file found"

      - name: Generate RSS feed
        env:
          PODCAST_BASE_URL: https://podcast.cariboosignals.ca/
        run: python generate_cariboo_sunday_feed.py

      - name: Commit generated show and feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add podcasts/cariboo_sunday_*.mp3 || echo "No audio file to stage"
          git add podcasts/cariboo_sunday_*.json || true
          git add podcasts/.music_cache/ || true
          git add cariboo-sunday-feed.xml || true

          git diff --quiet && git diff --staged --quiet \
            || git commit -m "Cariboo Sunday show - $(TZ='America/Vancouver' date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
        continue-on-error: true

      - name: Sync to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          BUCKET="cariboo-signals"
          echo "Syncing Cariboo Sunday content to R2..."

          aws s3 cp cariboo-sunday-feed.xml "s3://${BUCKET}/cariboo-sunday-feed.xml" \
            --content-type "application/rss+xml" \
            --cache-control "no-cache"
          aws s3 cp cariboo-sunday.html "s3://${BUCKET}/cariboo-sunday.html" \
            --content-type "text/html" \
            --cache-control "no-cache"
          aws s3 cp cariboo-weekends.html "s3://${BUCKET}/cariboo-weekends.html" \
            --content-type "text/html" \
            --cache-control "no-cache"

          for img in cariboo-weekends.png cariboo-saturday.png cariboo-sunday.png; do
            [ -f "$img" ] && aws s3 cp "$img" "s3://${BUCKET}/${img}" \
              --content-type "image/png" \
              --cache-control "max-age=86400" \
              && echo "  uploaded $img"
          done

          for f in podcasts/cariboo_sunday_*.mp3; do
            [ -f "$f" ] && echo "  uploading $f" && \
              aws s3 cp "$f" "s3://${BUCKET}/${f}" --content-type "audio/mpeg"
          done

          for f in podcasts/cariboo_sunday_*_chapters.json; do
            [ -f "$f" ] && echo "  uploading $f" && \
              aws s3 cp "$f" "s3://${BUCKET}/${f}" --content-type "application/json"
          done

          for img in cariboo-weekends.png cariboo-saturday.png cariboo-sunday.png cariboo-signals.png; do
            [ -f "$img" ] && aws s3 cp "$img" "s3://${BUCKET}/${img}" \
              --content-type "image/png" \
              --cache-control "public, max-age=86400"
          done

          echo "R2 sync complete"
        continue-on-error: true

      - name: Prepare output for GitHub Pages
        run: |
          mkdir -p output/podcasts

          cp podcasts/cariboo_sunday_*.mp3 output/podcasts/ 2>/dev/null || true
          cp podcasts/cariboo_sunday_*_chapters.json output/podcasts/ 2>/dev/null || true
          cp cariboo-sunday-feed.xml output/ 2>/dev/null || true
          cp cariboo-sunday.html output/ 2>/dev/null || true
          cp cariboo-weekends.html output/ 2>/dev/null || true
          cp cariboo-signals.png output/ 2>/dev/null || true
          cp cariboo-weekends.png output/ 2>/dev/null || true
          cp cariboo-saturday.png output/ 2>/dev/null || true
          cp cariboo-sunday.png output/ 2>/dev/null || true

          echo "Output:"
          ls -lh output/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: "cariboo-sunday: deploy show ${{ github.run_id }}"

      - name: Upload show as artifact
        if: ${{ inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: cariboo-sunday-show
          path: podcasts/cariboo_sunday_*.mp3
          retention-days: 14
