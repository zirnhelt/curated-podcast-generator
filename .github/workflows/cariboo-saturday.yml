name: Cariboo Saturday Morning Show

on:
  schedule:
    # Every Saturday at 5:00 AM Pacific Time
    # 5:00 AM PDT = 12:00 UTC (Mar–Nov)
    # 5:00 AM PST = 13:00 UTC (Nov–Mar)
    # Using 12:00 UTC year-round (will run at 6 AM in PST winter)
    - cron: '0 12 * * 6'
  workflow_dispatch:   # Manual trigger from GitHub Actions UI
    inputs:
      dry_run:
        description: 'Dry run only (check feeds, no download/assembly)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  generate-cariboo-saturday:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install boto3

      - name: Generate Cariboo Saturday Morning show
        env:
          JAMENDO_CLIENT_ID: ${{ secrets.JAMENDO_CLIENT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "=== Cariboo Saturday Morning Generator ==="
          echo "Run date: $(TZ='America/Vancouver' date)"
          echo "Dry run: ${{ inputs.dry_run || 'false' }}"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python cariboo_saturday.py --dry-run
          else
            python cariboo_saturday.py
          fi

      - name: List output file
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          echo "Generated files:"
          ls -lh podcasts/cariboo_saturday_*.mp3 2>/dev/null || echo "No output file found"

      - name: Generate RSS feed
        env:
          PODCAST_BASE_URL: https://podcast.cariboosignals.ca/
        run: python generate_cariboo_saturday_feed.py

      - name: Commit generated show and feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add podcasts/cariboo_saturday_*.mp3 || echo "No audio file to stage"
          git add podcasts/cariboo_saturday_*.json || true
          git add podcasts/.music_cache/ || true
          git add cariboo-saturday-feed.xml || true

          git diff --quiet && git diff --staged --quiet \
            || git commit -m "Cariboo Saturday show - $(TZ='America/Vancouver' date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
        continue-on-error: true

      - name: Sync to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          BUCKET="cariboo-signals"
          echo "Syncing Cariboo Saturday content to R2..."

          aws s3 cp cariboo-saturday-feed.xml "s3://${BUCKET}/cariboo-saturday-feed.xml" \
            --content-type "application/rss+xml" \
            --cache-control "no-cache"
          aws s3 cp cariboo-saturday.html "s3://${BUCKET}/cariboo-saturday.html" \
            --content-type "text/html" \
            --cache-control "no-cache"
          aws s3 cp cariboo-weekends.html "s3://${BUCKET}/cariboo-weekends.html" \
            --content-type "text/html" \
            --cache-control "no-cache"

          for f in podcasts/cariboo_saturday_*.mp3; do
            [ -f "$f" ] && echo "  uploading $f" && \
              aws s3 cp "$f" "s3://${BUCKET}/${f}" --content-type "audio/mpeg"
          done

          echo "R2 sync complete"
        continue-on-error: true

      - name: Prepare output for GitHub Pages
        run: |
          mkdir -p output/podcasts

          cp podcasts/cariboo_saturday_*.mp3 output/podcasts/ 2>/dev/null || true
          cp cariboo-saturday-feed.xml output/ 2>/dev/null || true
          cp cariboo-saturday.html output/ 2>/dev/null || true
          cp cariboo-weekends.html output/ 2>/dev/null || true

          echo "Output:"
          ls -lh output/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: "cariboo-saturday: deploy show ${{ github.run_id }}"

      - name: Upload show as artifact
        if: ${{ inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: cariboo-saturday-show
          path: podcasts/cariboo_saturday_*.mp3
          retention-days: 14

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Cariboo Saturday failed to generate — ${date}`,
              body: `The Cariboo Saturday Morning show failed to generate on ${date}.\n\n**Workflow run:** ${runUrl}\n\nCheck the run logs for the specific error (most commonly a CBC feed download failure or API timeout).`,
            });
