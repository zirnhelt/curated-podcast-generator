name: CBC Saturday Morning Show

on:
  schedule:
    # Every Saturday at 8:00 AM Pacific Time
    # 8:00 AM PST = 16:00 UTC (Nov–Mar)
    # 8:00 AM PDT = 15:00 UTC (Mar–Nov)
    # Using 16:00 UTC year-round (will run at 9 AM in PDT summer)
    - cron: '0 16 * * 6'
  workflow_dispatch:   # Manual trigger from GitHub Actions UI
    inputs:
      dry_run:
        description: 'Dry run only (check feeds, no download/assembly)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-cbc-saturday:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install boto3

      - name: Generate CBC Saturday Morning show
        env:
          JAMENDO_CLIENT_ID: ${{ secrets.JAMENDO_CLIENT_ID }}
        run: |
          echo "=== CBC Saturday Morning Generator ==="
          echo "Run date: $(TZ='America/Vancouver' date)"
          echo "Dry run: ${{ inputs.dry_run || 'false' }}"

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python cbc_saturday.py --dry-run
          else
            python cbc_saturday.py
          fi

      - name: List output file
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          echo "Generated files:"
          ls -lh podcasts/cbc_saturday_*.mp3 2>/dev/null || echo "No output file found"

      - name: Generate RSS feed
        if: ${{ inputs.dry_run != 'true' }}
        env:
          PODCAST_BASE_URL: https://podcast.cariboosignals.ca/
        run: python generate_cbc_saturday_feed.py

      - name: Commit generated show and feed
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add podcasts/cbc_saturday_*.mp3 || echo "No audio file to stage"
          git add podcasts/.music_cache/ || true
          git add cbc-saturday-feed.xml || true

          git diff --quiet && git diff --staged --quiet \
            || git commit -m "CBC Saturday show - $(TZ='America/Vancouver' date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
        continue-on-error: true

      - name: Sync to Cloudflare R2
        if: ${{ inputs.dry_run != 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          BUCKET="cariboo-signals"
          echo "Syncing CBC Saturday content to R2..."

          aws s3 cp cbc-saturday-feed.xml "s3://${BUCKET}/cbc-saturday-feed.xml" \
            --content-type "application/rss+xml" \
            --cache-control "no-cache"

          for f in podcasts/cbc_saturday_*.mp3; do
            [ -f "$f" ] && echo "  uploading $f" && \
              aws s3 cp "$f" "s3://${BUCKET}/${f}" --content-type "audio/mpeg"
          done

          echo "R2 sync complete"
        continue-on-error: true

      - name: Prepare output for GitHub Pages
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          mkdir -p output/podcasts

          cp podcasts/cbc_saturday_*.mp3 output/podcasts/ 2>/dev/null || true
          cp cbc-saturday-feed.xml output/ 2>/dev/null || true

          echo "Output:"
          ls -lh output/

      - name: Deploy to GitHub Pages
        if: ${{ inputs.dry_run != 'true' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: "cbc-saturday: deploy show ${{ github.run_id }}"

      - name: Upload show as artifact
        if: ${{ inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: cbc-saturday-show
          path: podcasts/cbc_saturday_*.mp3
          retention-days: 14
