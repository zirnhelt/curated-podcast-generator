name: Cleanup Merged Branches

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale claude/ branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            branch="${{ github.head_ref }}"
            echo "Deleting closed PR branch: $branch"
            gh api "repos/${{ github.repository }}/git/refs/heads/$branch" -X DELETE \
              && echo "Deleted $branch" || echo "Branch already deleted or protected"
          else
            echo "Scanning for stale claude/ branches..."
            branches=$(gh api "repos/${{ github.repository }}/branches?per_page=100" --paginate -q '.[].name' | grep '^claude/')
            for branch in $branches; do
              open_prs=$(gh api "repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:${branch}&state=open" -q 'length')
              if [ "$open_prs" = "0" ]; then
                echo "Deleting stale branch (no open PR): $branch"
                gh api "repos/${{ github.repository }}/git/refs/heads/$branch" -X DELETE \
                  && echo "Deleted $branch" || echo "Failed to delete $branch"
              else
                echo "Keeping $branch (has open PR)"
              fi
            done
          fi
