name: Seed Content

# Triggered by the GitHub API — designed to be called from an iOS Shortcut.
#
# TWO ways to trigger from an iOS Shortcut or script:
#
# ── Option B (RECOMMENDED for iOS Shortcuts): repository_dispatch ────────────
#   Only requires 'repo' scope on your PAT — no 'workflow' scope needed.
#   Avoids the 403 "Bad credentials" error caused by missing 'workflow' scope,
#   and the secondary rate limits on the workflow_dispatch endpoint.
#
#   POST https://api.github.com/repos/OWNER/REPO/dispatches
#   Authorization: Bearer <PAT>
#   Content-Type: application/json
#   {
#     "event_type": "seed-content",
#     "client_payload": {
#       "type": "url",
#       "content": "https://example.com/article",
#       "note": "great angle on rural connectivity",
#       "priority": "normal",
#       "theme_hint": ""
#     }
#   }
#   Success: HTTP 204 (No Content)
#
# ── Option A: workflow_dispatch (requires 'workflow' scope on PAT) ──────────
#   NOT recommended from iOS Shortcuts — requires the harder-to-get 'workflow'
#   scope and the endpoint has stricter secondary rate limits.
#
#   POST https://api.github.com/repos/OWNER/REPO/actions/workflows/seed-content.yml/dispatches
#   Authorization: Bearer <PAT>
#   Content-Type: application/json
#   {
#     "ref": "main",
#     "inputs": {
#       "type": "url",
#       "content": "https://example.com/article",
#       "note": "great angle on rural connectivity",
#       "priority": "normal",
#       "theme_hint": ""
#     }
#   }
#   Success: HTTP 204 (No Content)
#
# ── iOS Shortcut: tag picker ─────────────────────────────────────────────────
#   tags.txt is a plain newline-separated list (no JSON parsing needed).
#   Updated on every seed commit, readable without auth:
#
#     GET https://raw.githubusercontent.com/zirnhelt/curated-podcast-generator/main/tags.txt
#
#   Shortcut steps for the tag field:
#     1. Get Contents of URL  →  tags.txt URL above
#     2. Split Text  by  New Lines  →  Tag Options
#     3. List:  item 1 = "New tag…"  /  item 2 = Tag Options variable
#     4. Choose from List  (prompt: "Tag")  →  Set Variable "Chosen Tag"
#     5. Ask for Input  (prompt: "Confirm or edit tag",
#                        Default Value: Chosen Tag variable)
#     6. Set Variable "Chosen Tag"  to  Ask for Input result
#     7. Use Chosen Tag as the "tag" field in the dispatch body
#
# ── Debugging ────────────────────────────────────────────────────────────────
#   Run scripts/debug-seed-dispatch.sh to check your PAT scopes and see the
#   actual HTTP status (iOS Shortcuts silently swallows 403/422 errors).

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Seed type'
        required: true
        default: 'url'
        type: choice
        options:
          - url
          - thought
      content:
        description: 'URL (for url type) or thought text (for thought type)'
        required: true
        type: string
      note:
        description: 'Optional note or angle to explore'
        required: false
        default: ''
        type: string
      priority:
        description: 'Priority — high forces the seed into the next deep dive'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - high
      theme_hint:
        description: 'Optional theme to target (e.g. "Resilient Rural Futures")'
        required: false
        default: ''
        type: string
      tag:
        description: 'Bespoke topic tag (e.g. "billionaires", "middle-east"). When 3+ seeds share the same tag, a bespoke episode is auto-generated.'
        required: false
        default: ''
        type: string

  repository_dispatch:
    types: [seed-content]

permissions:
  contents: write
  actions: write   # required to dispatch generate-bespoke.yml when tag threshold is reached

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger source
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Event type:   ${{ github.event.action }}"
          echo "Seed type:    ${{ inputs.type || github.event.client_payload.type }}"
          echo "Content:      ${{ inputs.content || github.event.client_payload.content }}"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run seed.py
        env:
          SEED_TYPE: ${{ inputs.type || github.event.client_payload.type }}
          SEED_CONTENT: ${{ inputs.content || github.event.client_payload.content }}
          SEED_NOTE: ${{ inputs.note || github.event.client_payload.note }}
          SEED_PRIORITY: ${{ inputs.priority || github.event.client_payload.priority }}
          SEED_THEME: ${{ inputs.theme_hint || github.event.client_payload.theme_hint }}
          SEED_TAG: ${{ inputs.tag || github.event.client_payload.tag }}
          # Intentionally omit GITHUB_TOKEN/GITHUB_REPOSITORY here so seed.py
          # does not dispatch generate-bespoke.yml before the seed is committed.
          # Dispatch happens in the "Dispatch bespoke if threshold reached" step
          # below, after the commit/push has landed.
        run: |
          SEED_TYPE="${SEED_TYPE:-url}"
          SEED_PRIORITY="${SEED_PRIORITY:-normal}"

          ARGS=("$SEED_TYPE" "$SEED_CONTENT")

          if [ -n "$SEED_NOTE" ]; then
            ARGS+=(--note "$SEED_NOTE")
          fi

          ARGS+=(--priority "$SEED_PRIORITY")

          if [ -n "$SEED_THEME" ]; then
            ARGS+=(--theme "$SEED_THEME")
          fi

          if [ -n "$SEED_TAG" ]; then
            ARGS+=(--tag "$SEED_TAG")
          fi

          python seed.py "${ARGS[@]}"

      - name: Commit and push updated seeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcasts/content_seeds.json tags.json tags.txt
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          TYPE="${{ inputs.type || github.event.client_payload.type }}"
          CONTENT="${{ inputs.content || github.event.client_payload.content }}"
          TAG="${{ inputs.tag || github.event.client_payload.tag }}"
          SHORT="${CONTENT:0:60}"
          TAG_SUFFIX=""
          if [ -n "$TAG" ]; then TAG_SUFFIX=" [#${TAG}]"; fi
          git commit -m "seed: add ${TYPE}${TAG_SUFFIX} — ${SHORT}"
          git push

      - name: Dispatch bespoke if threshold reached
        # Run AFTER the commit/push so generate-bespoke.yml sees all seeds.
        # Uses repository_dispatch (not workflow_dispatch) so this step works
        # with the default GITHUB_TOKEN and does not require 'workflow' PAT scope.
        # repository_dispatch also avoids secondary-rate-limit conflicts when an
        # iOS Shortcut triggers generate-bespoke.yml around the same time.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEED_TAG: ${{ inputs.tag || github.event.client_payload.tag }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$SEED_TAG" ]; then
            echo "No tag — skipping bespoke check."
            exit 0
          fi
          THRESHOLD=3
          COUNT=$(python3 -c "import json,os; tag=os.environ['SEED_TAG'].lower(); data=json.load(open('podcasts/content_seeds.json')); print(len([s for s in data.get('seeds',[]) if s.get('tag','').lower()==tag and s.get('status')=='pending']))")
          echo "Pending seeds for tag '$SEED_TAG': $COUNT (threshold: $THRESHOLD)"
          if [ "$COUNT" -ge "$THRESHOLD" ]; then
            echo "Threshold reached — dispatching generate-bespoke via repository_dispatch for tag '$SEED_TAG'"
            PAYLOAD=$(printf '{"event_type":"generate-bespoke","client_payload":{"tag":"%s","threshold":"%s"}}' "$SEED_TAG" "$THRESHOLD")
            gh api "repos/${REPO}/dispatches" --method POST --input - <<<"$PAYLOAD"
          else
            echo "Not enough seeds yet — no dispatch."
          fi
