name: Harvest Episode
run-name: "Harvest Episode — ${{ github.event.inputs.episode }}"

on:
  workflow_dispatch:
    inputs:
      episode:
        description: 'Which episode to harvest'
        required: true
        default: 'most recent'
        type: choice
        options:
          - most recent
          - Arts, Culture & Digital Storytelling
          - Working Lands & Industry
          - Gear, Gadgets & Practical Tech
          - Indigenous Lands & Innovation
          - Wild Spaces & Outdoor Life
          - Cariboo Local Affairs
          - Science, Wonder & the Natural World

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write

jobs:
  harvest:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Resolve episode date
        id: params
        env:
          INPUT_EPISODE: ${{ github.event.inputs.episode }}
        run: |
          if [ "$INPUT_EPISODE" = "most recent" ]; then
            echo "date=" >> "$GITHUB_OUTPUT"
            echo "Harvesting most recent episode"
          else
            DATE=$(python3 -c "
import glob, json, re, sys
theme = '$INPUT_EPISODE'
dates = []
for path in glob.glob('podcasts/citations_*.json'):
    try:
        with open(path) as f:
            data = json.load(f)
        if data.get('episode', {}).get('theme', '') == theme:
            m = re.search(r'citations_(\d{4}-\d{2}-\d{2})_', path)
            if m:
                dates.append(m.group(1))
    except Exception:
        pass
if not dates:
    print(f'No episodes found for theme: {theme}', file=sys.stderr)
    sys.exit(1)
print(max(dates))
")
            echo "date=$DATE" >> "$GITHUB_OUTPUT"
            echo "Harvesting most recent '$INPUT_EPISODE' episode: $DATE"
          fi

      - name: Run episode harvest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EPISODE_DATE: ${{ steps.params.outputs.date }}
        run: |
          if [ -n "$EPISODE_DATE" ]; then
            python harvest_episode.py --date "$EPISODE_DATE" --output file
          else
            python harvest_episode.py --output file
          fi

      - name: Read harvest for issue body
        id: report
        run: |
          HARVEST_FILE=$(ls reviews/harvest_*.md | sort | tail -1)
          echo "path=$HARVEST_FILE" >> "$GITHUB_OUTPUT"
          # Extract episode date from filename for issue title
          EPISODE_DATE=$(basename "$HARVEST_FILE" | sed 's/harvest_\([0-9-]*\)_.*/\1/')
          echo "episode_date=$EPISODE_DATE" >> "$GITHUB_OUTPUT"
          # Truncate to ~65000 chars to fit in a GitHub issue body
          python3 -c "
          with open('$HARVEST_FILE') as f:
              content = f.read()
          limit = 65000
          if len(content) > limit:
              content = content[:limit] + '\n\n*(truncated — see committed file for full version)*'
          print(content, end='')
          " > /tmp/harvest_body.md

      - name: Create GitHub Issue with harvest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "episode-harvest" \
            --color "0075ca" \
            --description "Deep dive takeaways and action items" \
            2>/dev/null || true
          EPISODE_DATE="${{ steps.report.outputs.episode_date }}"
          gh issue create \
            --title "Episode Harvest — $EPISODE_DATE" \
            --body-file /tmp/harvest_body.md \
            --label "episode-harvest"

      - name: Commit harvest document
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews/
          git diff --staged --quiet && echo "No new harvest file to commit" || \
            git commit -m "Add episode harvest ${{ steps.report.outputs.episode_date }}"
          git push origin HEAD
