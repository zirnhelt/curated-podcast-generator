name: Generate Bespoke Episode

# Triggered automatically by seed-content.yml when 3+ seeds share the same tag,
# or manually via the GitHub Actions UI / API.
#
# TWO ways to trigger from an iOS Shortcut or script:
#
# ── Option A: workflow_dispatch (requires 'workflow' scope on PAT) ──────────
#   POST https://api.github.com/repos/OWNER/REPO/actions/workflows/generate-bespoke.yml/dispatches
#   Authorization: Bearer <PAT>
#   Content-Type: application/json
#   {
#     "ref": "main",
#     "inputs": { "tag": "billionaires" }
#   }
#   Success: HTTP 204 (No Content)
#
# ── Option B: repository_dispatch (only requires 'repo' scope on PAT) ───────
#   POST https://api.github.com/repos/OWNER/REPO/dispatches
#   Authorization: Bearer <PAT>
#   Content-Type: application/json
#   {
#     "event_type": "generate-bespoke",
#     "client_payload": { "tag": "billionaires", "threshold": "3" }
#   }
#   Success: HTTP 204 (No Content)
#
# ── Output files (in podcasts/bespoke/) ────────────────────────────────────
#   bespoke_audio_{tag}_{date}.mp3
#   bespoke_script_{tag}_{date}.txt
#   bespoke_citations_{tag}_{date}.json
#   bespoke_shownotes_{tag}_{date}.md

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Topic tag to generate episode for (e.g. "billionaires") — leave blank for sync-only'
        required: false
        type: string
      threshold:
        description: 'Minimum seeds required (default: 3)'
        required: false
        default: '3'
        type: string
      sync_only:
        description: 'Rebuild feed and upload to R2 without generating a new episode'
        required: false
        default: false
        type: boolean
      tts_provider:
        description: 'TTS provider — both generates OpenAI (for feed) + Azure (for comparison)'
        required: false
        default: both
        type: choice
        options:
          - both
          - openai
          - azure

  repository_dispatch:
    types: [generate-bespoke]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-bespoke:
    runs-on: ubuntu-latest

    steps:
      - name: Log trigger
        env:
          INPUT_TAG: ${{ inputs.tag || github.event.client_payload.tag }}
          INPUT_SYNC_ONLY: ${{ inputs.sync_only || github.event.client_payload.sync_only }}
          INPUT_THRESHOLD: ${{ inputs.threshold || github.event.client_payload.threshold }}
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Tag: $INPUT_TAG"
          echo "Sync-only: $INPUT_SYNC_ONLY"
          echo "Threshold: $INPUT_THRESHOLD"
          echo "UTC time: $(date -u)"

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Generate bespoke episode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          USE_AZURE_TTS: ${{ inputs.tts_provider == 'azure' && 'true' || '' }}
          AZURE_TTS_PARALLEL: ${{ (inputs.tts_provider == 'both' || inputs.tts_provider == '') && 'true' || '' }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          PODCAST_BASE_URL: https://podcast.cariboosignals.ca/
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: cariboo-signals
          # Pass user-supplied inputs via env vars, not inline ${{ }} expansion,
          # to prevent expression-injection if values contain shell metacharacters.
          INPUT_TAG: ${{ inputs.tag || github.event.client_payload.tag }}
          INPUT_THRESHOLD: ${{ inputs.threshold || github.event.client_payload.threshold }}
          INPUT_SYNC_ONLY: ${{ inputs.sync_only || github.event.client_payload.sync_only }}
        run: |
          SYNC_ONLY="${INPUT_SYNC_ONLY:-false}"
          TAG="${INPUT_TAG:-}"
          THRESHOLD="${INPUT_THRESHOLD:-3}"
          if [ "$SYNC_ONLY" = "true" ]; then
            python generate_bespoke.py --sync-only
          else
            python generate_bespoke.py --tag "$TAG" --threshold "$THRESHOLD"
          fi

      - name: List generated files
        run: |
          echo "Bespoke episode files:"
          ls -la podcasts/bespoke/ 2>/dev/null || echo "No bespoke files found"

      - name: Commit episode files and updated seeds
        env:
          COMMIT_TAG: ${{ inputs.tag || github.event.client_payload.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add podcasts/bespoke/ || echo "No bespoke dir to add"
          git add podcasts/content_seeds.json || echo "No seeds file to add"
          git add podcasts/bespoke_debate_memory.json || echo "No bespoke memory to add"
          git add bespoke-feed.xml || echo "No feed file to add"

          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "bespoke: generate episode for tag '$COMMIT_TAG'"
          git pull --rebase origin main
          git push

      - name: Sync bespoke files to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          BUCKET="cariboo-signals"
          echo "Syncing bespoke content to R2..."

          # Feed and landing page (no-cache so CDN serves fresh content)
          aws s3 cp bespoke-feed.xml "s3://${BUCKET}/bespoke-feed.xml" \
            --content-type "application/rss+xml" \
            --cache-control "no-cache"
          aws s3 cp bespoke.html "s3://${BUCKET}/bespoke.html" \
            --content-type "text/html" \
            --cache-control "no-cache"
          [ -f Deepdives.png ] && aws s3 cp Deepdives.png "s3://${BUCKET}/Deepdives.png" \
            --content-type "image/png"

          # All bespoke audio files
          for f in podcasts/bespoke/bespoke_audio_*.mp3; do
            [ -f "$f" ] && echo "  uploading $f" && \
              aws s3 cp "$f" "s3://${BUCKET}/${f}" --content-type "audio/mpeg"
          done

          echo "R2 sync complete"
        continue-on-error: true

      - name: Prepare output for GitHub Pages
        run: |
          mkdir -p output/podcasts/bespoke

          # Bespoke episode files
          cp podcasts/bespoke/bespoke_audio_*.mp3   output/podcasts/bespoke/ 2>/dev/null || true
          cp podcasts/bespoke/bespoke_script_*.txt   output/podcasts/bespoke/ 2>/dev/null || true
          cp podcasts/bespoke/bespoke_citations_*.json output/podcasts/bespoke/ 2>/dev/null || true
          cp podcasts/bespoke/bespoke_shownotes_*.md  output/podcasts/bespoke/ 2>/dev/null || true

          # Bespoke RSS feed, landing page, and cover image at site root
          cp bespoke-feed.xml output/
          cp bespoke.html output/
          cp Deepdives.png output/

          echo "Output:"
          ls -lh output/
          ls -lh output/podcasts/bespoke/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: "bespoke: deploy episode '${{ inputs.tag || github.event.client_payload.tag }}' - ${{ github.run_id }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bespoke-${{ inputs.tag || github.event.client_payload.tag }}-${{ github.run_id }}
          path: |
            podcasts/bespoke/bespoke_audio_*.mp3
            podcasts/bespoke/bespoke_script_*.txt
            podcasts/bespoke/bespoke_citations_*.json
            podcasts/bespoke/bespoke_shownotes_*.md
            bespoke-feed.xml
            podcasts/tts_comparison_log.json
          retention-days: 30
        if: always()
