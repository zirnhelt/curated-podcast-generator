name: Generate French Episode (Aurélie & Kaël)

# Generates a full French (fr-CA) Cariboo Signals episode with Dragon HD voices
# (Aurélie/Sylvie fr-CA, Kaël/Thierry fr-FR) and Cariboo Signals theme songs.
# Runs in two reviewable stages; optionally publishes to R2 + GitHub Pages.
#
# Two stages, reviewed in order:
#   1. mode=dry-run    — adapt English script to French, save for review
#                        (download "french-prototype-state" artifact or read job log)
#   2. mode=synthesize — render full episode audio with theme songs
#                        (download artifact to listen; optionally set publish=true)
#
# Every Actions run starts from a fresh checkout. The artifact bridge persists
# the saved script between runs so dry-run → synthesize works across separate clicks.
#
# Output files (in podcasts/french_prototype/):
#   script_fr_{date}_{theme}.txt
#   sample_audio_fr_{date}_{theme}.mp3
# When publish=true: also updates podcast-fr-feed.xml, syncs to R2, deploys to Pages.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run in order: dry-run (adapt + save script for review) -> synthesize (render sample audio from that script)'
        required: false
        default: dry-run
        type: choice
        options:
          - dry-run
          - synthesize
      source:
        description: 'dry-run only: filename (under podcasts/) of the English script to adapt; blank = most recent daily episode script'
        required: false
        type: string
      publish:
        description: 'synthesize only: update podcast-fr-feed.xml, sync audio to R2, and deploy to GitHub Pages'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  generate-french-prototype:
    runs-on: ubuntu-latest

    steps:
      - name: Log trigger
        env:
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_SOURCE: ${{ inputs.source }}
        run: |
          echo "Mode: ${INPUT_MODE:-dry-run}"
          echo "Source override: ${INPUT_SOURCE:-<most recent podcast_script_*.txt>}"
          echo "UTC time: $(date -u)"

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Restore saved script from the dry-run stage
        if: ${{ inputs.mode == 'synthesize' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name == "french-prototype-state" and .expired == false)] | sort_by(.created_at) | last | .id // empty')
          if [ -z "$ARTIFACT_ID" ]; then
            echo "::error::No saved 'french-prototype-state' artifact found from a prior run."
            echo "Run mode=dry-run first (and review the adapted script) before running mode=synthesize."
            exit 1
          fi
          echo "Restoring artifact #$ARTIFACT_ID..."
          mkdir -p podcasts/french_prototype
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/french-state.zip
          unzip -o /tmp/french-state.zip -d podcasts/french_prototype/
          rm /tmp/french-state.zip
          echo "Restored:"
          ls -la podcasts/french_prototype/script_fr_* 2>/dev/null || { echo "::error::Restored artifact contained no adapted script"; exit 1; }

      - name: Generate French episode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          # Pass user-supplied inputs via env vars, not inline ${{ }} expansion,
          # to prevent expression-injection if values contain shell metacharacters.
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_SOURCE: ${{ inputs.source }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          MODE="${INPUT_MODE:-dry-run}"
          ARGS=()
          case "$MODE" in
            dry-run)    ARGS+=(--dry-run); [ -n "$INPUT_SOURCE" ] && ARGS+=(--source "$INPUT_SOURCE") ;;
            synthesize) [ "${INPUT_PUBLISH}" = "true" ] && ARGS+=(--publish) ;;
            *) echo "Unknown mode '$MODE'" >&2; exit 1 ;;
          esac
          python generate_french_prototype.py "${ARGS[@]}"

      - name: Commit French script and RSS feed
        if: ${{ inputs.mode == 'synthesize' && inputs.publish == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcast-fr-feed.xml || true
          git add podcasts/french_prototype/script_fr_*.txt || true
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "french: publish episode $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Sync audio and feed to Cloudflare R2
        if: ${{ inputs.mode == 'synthesize' && inputs.publish == true }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          BUCKET="cariboo-signals"
          aws s3 cp podcast-fr-feed.xml "s3://${BUCKET}/podcast-fr-feed.xml" \
            --content-type "application/rss+xml" \
            --cache-control "no-cache"
          aws s3 sync podcasts/french_prototype/ "s3://${BUCKET}/podcasts/french/" \
            --exclude "*" \
            --include "sample_audio_fr_*.mp3" \
            --content-type "audio/mpeg"
          echo "R2 sync complete"
        continue-on-error: true

      - name: Prepare output for GitHub Pages
        if: ${{ inputs.mode == 'synthesize' && inputs.publish == true }}
        run: |
          mkdir -p output/podcasts/french
          cp podcasts/french_prototype/sample_audio_fr_*.mp3 output/podcasts/french/ 2>/dev/null || true
          cp podcasts/french_prototype/script_fr_*.txt       output/podcasts/french/ 2>/dev/null || true
          cp podcast-fr-feed.xml output/ 2>/dev/null || true
          echo "Output:"
          ls -lh output/
          ls -lh output/podcasts/french/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        if: ${{ inputs.mode == 'synthesize' && inputs.publish == true }}
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: "french: deploy episode - ${{ github.run_id }}"

      - name: Save episode for review / handoff to the next stage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: french-prototype-state
          path: podcasts/french_prototype/
          retention-days: 14
          if-no-files-found: warn

      - name: List generated files
        run: |
          echo "French prototype files:"
          ls -la podcasts/french_prototype/ 2>/dev/null || echo "No prototype files found"
