name: Daily Podcast Generation

on:
  schedule:
    # Run daily at 3:00 AM Pacific Time
    # 3:00 AM PDT = 10:00 UTC (summer)
    # 3:00 AM PST = 11:00 UTC (winter)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      tts_provider:
        description: 'TTS provider — openai (default) uses OpenAI primary + Azure parallel; azure uses Azure only (no parallel)'
        required: false
        default: openai
        type: choice
        options:
          - openai
          - azure
      force:
        description: 'Force regeneration even if today''s episode already exists'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-episode:
    runs-on: ubuntu-latest
    outputs:
      episode_exists: ${{ steps.check.outputs.episode_exists }}
    steps:
      - name: Check if today's episode already exists
        id: check
        run: |
          TODAY=$(TZ='America/Vancouver' date '+%Y-%m-%d')
          echo "Checking for episode dated $TODAY in live RSS feed..."
          FEED=$(curl -sf --max-time 10 \
            "https://zirnhelt.github.io/curated-podcast-generator/podcast-feed.xml" || echo "")
          if echo "$FEED" | grep -q "$TODAY"; then
            echo "episode_exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Episode for $TODAY already exists — skipping generation"
          else
            echo "episode_exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 No episode for $TODAY found — proceeding with generation"
          fi

  generate-podcast:
    runs-on: ubuntu-latest
    needs: check-episode
    if: |
      needs.check-episode.outputs.episode_exists != 'true' ||
      inputs.force == true ||
      inputs.tts_provider == 'both' ||
      inputs.tts_provider == 'azure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Download existing files from GitHub Pages
        run: |
          # Download existing episodes and memory files if they exist
          echo "Downloading existing files from GitHub Pages..."

          # Ensure podcasts directory exists
          mkdir -p podcasts

          # Try to download memory files into podcasts/ (don't fail if they don't exist)
          wget https://zirnhelt.github.io/curated-podcast-generator/podcasts/episode_memory.json -O podcasts/episode_memory.json || echo "No episode memory found"
          wget https://zirnhelt.github.io/curated-podcast-generator/podcasts/host_personality_memory.json -O podcasts/host_personality_memory.json || echo "No host memory found"
          wget https://zirnhelt.github.io/curated-podcast-generator/podcasts/debate_memory.json -O podcasts/debate_memory.json || echo "No debate memory found"
          wget https://zirnhelt.github.io/curated-podcast-generator/podcasts/psa_rotation_state.json -O podcasts/psa_rotation_state.json || echo "No PSA rotation state found"

          # Download RSS feed for episode detection
          wget https://zirnhelt.github.io/curated-podcast-generator/podcast-feed.xml -O podcast-feed.xml || echo "No existing RSS feed"
          wget https://zirnhelt.github.io/curated-podcast-generator/tts-test-feed.xml -O tts-test-feed.xml || echo "No existing TTS test feed"

          echo "Download complete"
        continue-on-error: true

      - name: Generate daily podcast
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: cariboo-signals
        run: |
          echo "Starting daily podcast generation..."
          echo "Current UTC time: $(date -u)"
          echo "Current Pacific time: $(TZ='America/Vancouver' date)"

          python podcast_generator.py

          echo "Generation complete!"

      - name: List generated files
        run: |
          echo "Files in directory:"
          ls -la

          echo "Episode files in podcasts/:"
          ls -la podcasts/podcast_audio_* podcasts/podcast_script_* podcasts/citations_* || echo "No episode files found"

          echo "Memory files:"
          ls -la podcasts/episode_memory.json podcasts/host_personality_memory.json podcasts/debate_memory.json || echo "No memory files found"

      - name: Commit memory and cache files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add memory files and any other state files
          git add podcasts/episode_memory.json podcasts/host_personality_memory.json podcasts/debate_memory.json podcasts/psa_rotation_state.json

          # Persist seed consumption status (seeds marked "used" during generation)
          git add podcasts/content_seeds.json || echo "No seeds file to add"

          # Persist email queue state (items marked "used" during generation)
          git add podcasts/email_queue.json || echo "No email queue file to add"

          # Add any new episode files that were generated
          git add podcasts/podcast_audio_*.mp3 podcasts/podcast_script_*.txt podcasts/citations_*.json podcast-feed.xml || echo "No new episode files to add"
          git add tts-test-feed.xml || echo "No TTS test feed to add"

          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily podcast generation - $(TZ='America/Vancouver' date '+%Y-%m-%d %A')"
          git push
        continue-on-error: true

      - name: Copy files to output directory
        run: |
          echo "Preparing files for GitHub Pages deployment..."
          mkdir -p output/podcasts

          # Copy only recent episode files (last 2 days) — historical files are
          # already on gh-pages via keep_files: true, no need to re-deploy them.
          TODAY=$(TZ='America/Vancouver' date '+%Y-%m-%d')
          YESTERDAY=$(TZ='America/Vancouver' date -d 'yesterday' '+%Y-%m-%d')
          for f in podcasts/podcast_audio_*.mp3; do
            [[ "$f" == *"$TODAY"* || "$f" == *"$YESTERDAY"* ]] && cp "$f" output/podcasts/ && echo "  copied $f"
          done
          for f in podcasts/podcast_script_*.txt; do
            [[ "$f" == *"$TODAY"* || "$f" == *"$YESTERDAY"* ]] && cp "$f" output/podcasts/ && echo "  copied $f"
          done
          for f in podcasts/citations_*.json; do
            [[ "$f" == *"$TODAY"* || "$f" == *"$YESTERDAY"* ]] && cp "$f" output/podcasts/ && echo "  copied $f"
          done

          # Copy memory files into output/podcasts/
          cp podcasts/episode_memory.json podcasts/host_personality_memory.json podcasts/debate_memory.json output/podcasts/ 2>/dev/null || echo "No memory files to copy"
          cp podcasts/psa_rotation_state.json output/podcasts/ 2>/dev/null || echo "No PSA rotation state to copy"
          # NOTE: email_queue.json is intentionally NOT deployed — it contains
          # email sender addresses (PII) and partial message bodies.

          # Copy website files and all cover images referenced by index.html
          cp index.html output/
          cp podcast-feed.xml output/
          cp tts-test-feed.xml output/ 2>/dev/null || echo "No TTS test feed to copy"
          cp cariboo-signals.png output/
          cp cariboo-saturday.png output/ 2>/dev/null || true
          cp cariboo-sunday.png output/ 2>/dev/null || true
          cp Deepdives.png output/ 2>/dev/null || true

          echo "Files ready for deployment:"
          ls -la output/
          ls -la output/podcasts/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: 'Daily podcast deployment - ${{ github.run_id }}'

      - name: Upload artifacts (for debugging)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: daily-podcast-files
          path: |
            podcasts/podcast_audio_*.mp3
            podcasts/podcast_script_*.txt
            podcasts/citations_*.json
            podcasts/episode_memory.json
            podcasts/host_personality_memory.json
            podcasts/debate_memory.json
            podcasts/tts_comparison_log.json
          retention-days: 7
        if: always()
