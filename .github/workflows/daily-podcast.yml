name: Daily Podcast Generation

on:
  schedule:
    # Primary: 1:05 AM Pacific (UTC-7, permanent — BC no longer observes DST)
    # check-episode gates idempotency so duplicate triggers are safe.
    - cron: '5 8 * * *'
    # Fallback 1: 2:05 AM Pacific
    - cron: '5 9 * * *'
    # Fallback 2: 3:05 AM Pacific — still 3+ hrs before 6:30 AM wakeup
    - cron: '5 10 * * *'
  workflow_dispatch:
    inputs:
      tts_provider:
        description: 'TTS provider — gemini (default) uses Gemini multi-speaker with OpenAI fallback; openai uses OpenAI primary + Azure parallel; azure uses Azure only (no parallel)'
        required: false
        default: gemini
        type: choice
        options:
          - openai
          - azure
          - gemini
      force:
        description: 'Force regeneration even if today''s episode already exists'
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-podcast
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-episode:
    runs-on: ubuntu-latest
    outputs:
      episode_exists: ${{ steps.check.outputs.episode_exists }}
    steps:
      - name: Identify trigger
        run: |
          case "${{ github.event.schedule }}" in
            '5 8 * * *') label="Primary (1:05 AM Pacific)" ;;
            '5 9 * * *') label="Fallback 1 (2:05 AM Pacific)" ;;
            '5 10 * * *') label="Fallback 2 (3:05 AM Pacific)" ;;
            '')           label="Manual (workflow_dispatch)" ;;
            *)            label="Unknown: ${{ github.event.schedule }}" ;;
          esac
          echo "Trigger: $label"

      - name: Check if today's episode already exists
        id: check
        run: |
          TODAY=$(TZ='America/Vancouver' date '+%Y-%m-%d')
          echo "Checking for episode dated $TODAY in live RSS feed..."
          FEED=$(curl -sf --max-time 10 \
            "https://zirnhelt.github.io/curated-podcast-generator/podcast-feed.xml" || echo "")
          if echo "$FEED" | grep -q "$TODAY"; then
            echo "episode_exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Episode for $TODAY already exists — skipping generation"
          else
            echo "episode_exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 No episode for $TODAY found — proceeding with generation"
          fi

  generate-podcast:
    runs-on: ubuntu-latest
    needs: check-episode
    if: |
      needs.check-episode.outputs.episode_exists != 'true' ||
      inputs.force == true ||
      inputs.tts_provider == 'azure'

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Download existing files from GitHub Pages
        run: |
          # Download existing episodes and memory files if they exist
          echo "Downloading existing files from GitHub Pages..."

          # Ensure podcasts directory exists
          mkdir -p podcasts

          # Memory/state files and feeds are committed to git, so the checkout is
          # the source of truth — Pages lags git by minutes after a push, and a
          # queued fallback run once overwrote fresh memory with stale Pages
          # copies (2026-07-03), rolling back the day's episode memory.
          # Only fetch from Pages as a fallback when a file is missing entirely.
          for f in episode_memory.json host_personality_memory.json debate_memory.json psa_rotation_state.json twit_inspiration.json; do
            if [ ! -f "podcasts/$f" ]; then
              wget "https://zirnhelt.github.io/curated-podcast-generator/podcasts/$f" -O "podcasts/$f" || { rm -f "podcasts/$f"; echo "No $f found"; }
            fi
          done
          [ -f podcast-feed.xml ] || wget https://zirnhelt.github.io/curated-podcast-generator/podcast-feed.xml -O podcast-feed.xml || { rm -f podcast-feed.xml; echo "No existing RSS feed"; }
          [ -f tts-test-feed.xml ] || wget https://zirnhelt.github.io/curated-podcast-generator/tts-test-feed.xml -O tts-test-feed.xml || { rm -f tts-test-feed.xml; echo "No existing TTS test feed"; }

          # Download recent audio so _recover_orphaned_episodes() (3-day lookback) finds
          # audio for recent episodes and doesn't try to regenerate them.
          # Audio is no longer committed to git — fetch last 5 episodes from Pages instead.
          if [ -f podcast-feed.xml ]; then
            grep -oP '(?<=url=")[^"]+\.mp3(?=")' podcast-feed.xml | head -5 | while read url; do
              fname=$(basename "$url")
              wget -q "$url" -O "podcasts/$fname" && echo "  Downloaded $fname" || echo "  Skipped $fname"
            done
          fi

          echo "Download complete"
        continue-on-error: true

      - name: Generate daily podcast
        id: generate
        timeout-minutes: 60
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: cariboo-signals
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          USE_AZURE_TTS: ${{ inputs.tts_provider == 'azure' && 'true' || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USE_GEMINI_TTS: ${{ (inputs.tts_provider == 'gemini' || inputs.tts_provider == '') && 'true' || '' }}
        run: |
          case "${{ github.event.schedule }}" in
            '5 8 * * *') label="Primary (1:05 AM Pacific)" ;;
            '5 9 * * *') label="Fallback 1 (2:05 AM Pacific)" ;;
            '5 10 * * *') label="Fallback 2 (3:05 AM Pacific)" ;;
            '')           label="Manual (workflow_dispatch)" ;;
            *)            label="Unknown: ${{ github.event.schedule }}" ;;
          esac
          echo "Starting daily podcast generation..."
          echo "Trigger: $label"
          echo "Current UTC time: $(date -u)"
          echo "Current Pacific time: $(TZ='America/Vancouver' date)"

          # Re-check idempotency against the committed feed. The check-episode
          # job reads the live Pages feed, which lags git — a queued fallback
          # run can pass that check minutes after the primary run pushed, then
          # regenerate audio and clobber state (happened 2026-07-03).
          TODAY=$(TZ='America/Vancouver' date '+%Y-%m-%d')
          if [ "${{ github.event_name }}" = "schedule" ] && grep -q "$TODAY" podcast-feed.xml; then
            echo "✅ Episode for $TODAY already committed to git — skipping duplicate generation."
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python podcast_generator.py
          echo "generated=true" >> "$GITHUB_OUTPUT"

          echo "Generation complete!"

      - name: List generated files
        run: |
          echo "Files in directory:"
          ls -la

          echo "Episode files in podcasts/:"
          ls -la podcasts/podcast_audio_* podcasts/podcast_script_* podcasts/citations_* || echo "No episode files found"

          echo "Memory files:"
          ls -la podcasts/episode_memory.json podcasts/host_personality_memory.json podcasts/debate_memory.json || echo "No memory files found"

      - name: Commit memory and cache files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add memory files and any other state files
          git add podcasts/episode_memory.json podcasts/host_personality_memory.json podcasts/debate_memory.json podcasts/psa_rotation_state.json
          git add podcasts/twit_inspiration.json || true

          # Persist seed consumption status (seeds marked "used" during generation)
          git add podcasts/content_seeds.json || echo "No seeds file to add"

          # Persist email queue state (items marked "used" during generation)
          git add podcasts/email_queue.json || echo "No email queue file to add"

          # Add any new episode files that were generated (audio excluded — deployed via Pages/R2 only)
          git add podcasts/podcast_script_*.txt podcasts/citations_*.json podcasts/podcast_transcript_*.html podcasts/podcast_transcript_*.vtt podcast-feed.xml || echo "No new episode files to add"

          git add tts-test-feed.xml || echo "No TTS test feed to add"

          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily podcast generation - $(TZ='America/Vancouver' date '+%Y-%m-%d %A')"
          git push
        continue-on-error: true

      - name: Copy files to output directory
        run: |
          echo "Preparing files for GitHub Pages deployment..."
          mkdir -p output/podcasts

          # Copy only recent episode files (last 2 days) — historical files are
          # already on gh-pages via keep_files: true, no need to re-deploy them.
          TODAY=$(TZ='America/Vancouver' date '+%Y-%m-%d')
          YESTERDAY=$(TZ='America/Vancouver' date -d 'yesterday' '+%Y-%m-%d')
          for f in podcasts/podcast_audio_*.mp3; do
            [[  "$f" == *"$TODAY"* || "$f" == *"$YESTERDAY"* ]] && cp "$f" output/podcasts/ && echo "  copied $f"
          done
          for f in podcasts/podcast_script_*.txt; do
            [[ "$f" == *"$TODAY"* || "$f" == *"$YESTERDAY"* ]] && cp "$f" output/podcasts/ && echo "  copied $f"
          done
          for f in podcasts/citations_*.json; do
            [[ "$f" == *"$TODAY"* || "$f" == *"$YESTERDAY"* ]] && cp "$f" output/podcasts/ && echo "  copied $f"
          done
          for f in podcasts/podcast_transcript_*.html; do
            [[ "$f" == *"$TODAY"* || "$f" == *"$YESTERDAY"* ]] && cp "$f" output/podcasts/ && echo "  copied $f"
          done
          for f in podcasts/podcast_transcript_*.vtt; do
            [[ "$f" == *"$TODAY"* || "$f" == *"$YESTERDAY"* ]] && cp "$f" output/podcasts/ && echo "  copied $f"
          done

          # Copy memory files into output/podcasts/
          cp podcasts/episode_memory.json podcasts/host_personality_memory.json podcasts/debate_memory.json output/podcasts/ 2>/dev/null || echo "No memory files to copy"
          cp podcasts/psa_rotation_state.json output/podcasts/ 2>/dev/null || echo "No PSA rotation state to copy"
          cp podcasts/twit_inspiration.json output/podcasts/ 2>/dev/null || echo "No TWIT inspiration cache to copy"
          # NOTE: email_queue.json is intentionally NOT deployed — it contains
          # email sender addresses (PII) and partial message bodies.

          # Copy website files and all cover images referenced by index.html
          cp index.html output/
          cp podcast-feed.xml output/
          cp tts-test-feed.xml output/ 2>/dev/null || echo "No TTS test feed to copy"
          cp cariboo-signals.png output/
          cp cariboo-saturday.png output/ 2>/dev/null || true
          cp cariboo-sunday.png output/ 2>/dev/null || true
          cp Deepdives.png output/ 2>/dev/null || true

          echo "Files ready for deployment:"
          ls -la output/
          ls -la output/podcasts/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: 'Daily podcast deployment - ${{ github.run_id }}'

      # Video is strictly additive and runs LAST, only after the episode has
      # been committed and deployed to Pages, and only when this run actually
      # generated a new episode (fallback cron runs that skipped generation
      # don't re-render). The 2026-07-15/16 runs showed why: the ffmpeg render
      # had unbounded memory growth (fixed in build_ffmpeg_command — see the
      # format-before-fps comment) that OOM-killed the runner VM (SIGTERM,
      # exit 143), and because the video step then sat before commit/deploy,
      # the runner death cancelled every remaining step — the generated
      # episode never shipped. continue-on-error still covers ordinary
      # failures; the ordering covers runner death.
      # Without the YT_* secrets the script runs render-only and leaves the
      # MP4 in podcasts/ for the review-artifact step below. Once the secrets
      # are added, the MP4 is uploaded to YouTube and removed.
      - name: Render video and upload to YouTube
        if: steps.generate.outputs.generated == 'true'
        timeout-minutes: 25
        continue-on-error: true
        env:
          # Flush progress prints immediately — the OOM kills above produced
          # zero log output because Python block-buffers stdout in CI.
          PYTHONUNBUFFERED: '1'
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PRIVACY: unlisted
        run: python video_generator.py

      # The upload ledger (idempotency record) is written by the video step,
      # which now runs after the main state commit — so it gets its own commit.
      - name: Commit YouTube upload ledger
        if: steps.generate.outputs.generated == 'true'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcasts/youtube_uploads.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Record YouTube upload - $(TZ='America/Vancouver' date '+%Y-%m-%d %A')"
            git pull --rebase origin main || true
            git push
          else
            echo "No ledger change to commit"
          fi

      # No-op when the video was uploaded to YouTube (the MP4 is deleted after
      # upload); in render-only/test mode this is how you review the video.
      - name: Upload video for review (render-only mode)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: episode-video
          path: podcasts/podcast_video_*.mp4
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload artifacts (for debugging)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: daily-podcast-files
          path: |
            podcasts/podcast_audio_*.mp3
            podcasts/podcast_script_*.txt
            podcasts/citations_*.json
            podcasts/video_timeline_*.json
            podcasts/youtube_uploads.json
            podcasts/episode_memory.json
            podcasts/host_personality_memory.json
            podcasts/debate_memory.json
            podcasts/tts_comparison_log.json
          retention-days: 7
        if: always()
