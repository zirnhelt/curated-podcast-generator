name: Generate Intro Episode

# One-off generator for the "Introducing the Show" welcome episode — a short
# Riley & Casey conversation that introduces the hosts and walks new listeners
# through the 7 recurring daily themes, published into the MAIN "Cariboo
# Signals" feed (NOT the separate Deep Dives / bespoke show).
#
# generate_intro_episode.py runs as three forced, reviewable stages, each
# building on the last stage's saved output:
#   1. dry-run      — generate + save the script, print it for review/editing
#   2. skip-publish — build audio + citations from that reviewed script
#   3. full         — publish the reviewed audio + citations live
#
# Every Actions run starts from a fresh checkout, so the saved
# script/audio/citations don't persist on disk between separate runs the way
# they would on a local machine. To bridge that, each run uploads whatever it
# produced as a workflow artifact named "intro-episode-state", and any run
# past stage 1 starts by restoring the most recent such artifact (found via
# the Actions API across all prior runs of this workflow) into podcasts/ —
# so dry-run -> skip-publish -> full chain together correctly even though
# they're three separate "Run workflow" clicks, possibly days apart.
#
# Trigger manually via the Actions tab ("Run workflow"), in order:
#   1. mode=dry-run      — review the script printed in the job log (edit the
#                          downloaded "intro-episode-state" artifact's .txt
#                          file and re-run dry-run if you want to revise it)
#   2. mode=skip-publish — review the generated audio (download
#                          "intro-episode-state" from the run summary to listen)
#   3. mode=full         — publish live and deploy
#
# Output files (in podcasts/):
#   podcast_audio_{date}_introducing_the_show.mp3
#   podcast_script_{date}_introducing_the_show.txt
#   citations_{date}_introducing_the_show.json

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run in order: dry-run (review script) -> skip-publish (review audio) -> full (publish live)'
        required: false
        default: dry-run
        type: choice
        options:
          - dry-run
          - skip-publish
          - full
      date:
        description: 'dry-run only: override the date stamp baked into the script filename (YYYY-MM-DD); blank = today (Pacific). Later stages reuse whatever date the saved script carries.'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-intro-episode:
    runs-on: ubuntu-latest

    steps:
      - name: Log trigger
        env:
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_DATE: ${{ inputs.date }}
        run: |
          echo "Mode: ${INPUT_MODE:-dry-run}"
          echo "Date override: ${INPUT_DATE:-<today, Pacific — dry-run only>}"
          echo "UTC time: $(date -u)"

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Download existing episodes for feed regeneration
        # publish() -> generate_podcast_rss_feed() rebuilds podcast-feed.xml from
        # whatever podcasts/podcast_audio_*.mp3 files it finds on disk. On a fresh
        # Actions checkout that's normally just THIS run's new episode (daily
        # episode audio lives on R2/Pages, not in git), so without this step,
        # publishing the intro episode would overwrite the feed with a single
        # item and silently drop every other episode — exactly what
        # daily-podcast.yml's "Download existing files from GitHub Pages" step
        # exists to prevent for the regular daily run.
        if: ${{ inputs.mode == 'full' }}
        run: |
          mkdir -p podcasts
          wget https://zirnhelt.github.io/curated-podcast-generator/podcast-feed.xml -O /tmp/existing-feed.xml || echo "No existing RSS feed"
          if [ -f /tmp/existing-feed.xml ]; then
            grep -oP '(?<=url=")[^"]+\.mp3(?=")' /tmp/existing-feed.xml | head -9 | while read url; do
              fname=$(basename "$url")
              wget -q "$url" -O "podcasts/$fname" && echo "  Downloaded $fname" || echo "  Skipped $fname"
            done
          fi
        continue-on-error: true

      - name: Restore saved progress from a prior stage
        if: ${{ inputs.mode != 'dry-run' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name == "intro-episode-state" and .expired == false)] | sort_by(.created_at) | last | .id // empty')
          if [ -z "$ARTIFACT_ID" ]; then
            echo "::error::No saved 'intro-episode-state' artifact found from a prior run."
            echo "Run mode=dry-run first (and review the script), then mode=skip-publish (and review the audio), before running this mode."
            exit 1
          fi
          echo "Restoring artifact #$ARTIFACT_ID..."
          mkdir -p podcasts
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > /tmp/intro-state.zip
          unzip -o /tmp/intro-state.zip -d podcasts/
          rm /tmp/intro-state.zip
          echo "Restored:"
          ls -la podcasts/*introducing_the_show* 2>/dev/null || { echo "::error::Restored artifact contained no matching files"; exit 1; }

      - name: Generate intro episode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PODCAST_BASE_URL: https://podcast.cariboosignals.ca/
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: cariboo-signals
          # Pass user-supplied inputs via env vars, not inline ${{ }} expansion,
          # to prevent expression-injection if values contain shell metacharacters.
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_DATE: ${{ inputs.date }}
        run: |
          MODE="${INPUT_MODE:-dry-run}"
          ARGS=()
          [ -n "$INPUT_DATE" ] && ARGS+=(--date "$INPUT_DATE")
          case "$MODE" in
            dry-run)      ARGS+=(--dry-run) ;;
            skip-publish) ARGS+=(--skip-publish) ;;
            full)         ;;
            *) echo "Unknown mode '$MODE'" >&2; exit 1 ;;
          esac
          python generate_intro_episode.py "${ARGS[@]}"

      - name: Save progress for the next stage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: intro-episode-state
          path: podcasts/*introducing_the_show*
          retention-days: 14
          if-no-files-found: warn

      - name: List generated files
        if: ${{ inputs.mode != 'dry-run' }}
        run: |
          echo "Intro episode files:"
          ls -la podcasts/*introducing_the_show* 2>/dev/null || echo "No intro episode files found"

      - name: Commit episode files
        if: ${{ inputs.mode == 'full' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Audio excluded — deployed via Pages/R2 only, matching daily episodes
          git add podcasts/podcast_script_*introducing_the_show*.txt podcasts/citations_*introducing_the_show*.json podcast-feed.xml || echo "No new episode files to add"

          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "intro: generate 'Introducing the Show' episode"
          git pull --rebase origin main
          git push

      - name: Prepare output for GitHub Pages
        if: ${{ inputs.mode == 'full' }}
        run: |
          mkdir -p output/podcasts

          for f in podcasts/*introducing_the_show*; do
            [ -f "$f" ] && cp "$f" output/podcasts/ && echo "  copied $f"
          done

          cp index.html output/
          cp podcast-feed.xml output/
          cp cariboo-signals.png output/

          echo "Output:"
          ls -lh output/
          ls -lh output/podcasts/

      - name: Deploy to GitHub Pages
        if: ${{ inputs.mode == 'full' }}
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: "intro: deploy 'Introducing the Show' episode - ${{ github.run_id }}"
