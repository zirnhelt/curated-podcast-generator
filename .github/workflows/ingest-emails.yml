name: Ingest Emails

on:
  schedule:
    # Run every 4 hours; deliberately avoids 10:00 UTC when daily-podcast.yml runs
    - cron: '0 0,4,8,14,18,22 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Ensure podcasts directory exists
        run: mkdir -p podcasts

      - name: Ingest new emails from Gmail
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_LABEL: ${{ secrets.GMAIL_LABEL }}
        run: python email_ingest.py

      - name: Commit queue changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcasts/email_queue.json || true
          git diff --staged --quiet || git commit -m "Auto-ingest emails [skip ci] - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        continue-on-error: true
