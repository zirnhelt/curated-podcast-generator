name: Ingest Emails

on:
  schedule:
    # Run every 4 hours; deliberately avoids 10:00 UTC when daily-podcast.yml runs
    - cron: '0 0,4,8,14,18,22 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Download existing email queue from GitHub Pages
        run: |
          mkdir -p podcasts
          wget https://zirnhelt.github.io/curated-podcast-generator/podcasts/email_queue.json \
            -O podcasts/email_queue.json \
            || echo '{"version":1,"items":[]}' > podcasts/email_queue.json
          echo "Email queue loaded ($(python -c "import json; d=json.load(open('podcasts/email_queue.json')); print(len(d.get('items',[])))") existing items)"
        continue-on-error: true

      - name: Ingest new emails from Gmail
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_LABEL: ${{ secrets.GMAIL_LABEL }}
        run: python email_ingest.py

      - name: Commit queue changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add podcasts/email_queue.json
          git diff --staged --quiet || git commit -m "Auto-ingest emails [skip ci] - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        continue-on-error: true
