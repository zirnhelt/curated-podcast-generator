name: TTS Eval (no publish)

# Renders sections of the newest committed script through the selected TTS
# providers and uploads the audio as a run artifact. Zero side effects: no
# feed changes, no commits, no R2 uploads — download the artifact and listen.

on:
  workflow_dispatch:
    inputs:
      section:
        description: 'Script section to render'
        required: false
        default: deep_dive
        type: choice
        options:
          - welcome
          - news
          - community_spotlight
          - deep_dive
          - all
      providers:
        description: 'gemini renders Gemini only; all also renders OpenAI + Azure for comparison'
        required: false
        default: gemini
        type: choice
        options:
          - gemini
          - all

permissions:
  contents: read

jobs:
  tts-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|https://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Render sections
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ inputs.providers == 'all' && secrets.OPENAI_API_KEY || '' }}
          AZURE_SPEECH_KEY: ${{ inputs.providers == 'all' && secrets.AZURE_SPEECH_KEY || '' }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          TTS_PROVIDERS: ${{ inputs.providers }}
          TTS_SECTION: ${{ inputs.section }}
        run: |
          SKIP_FLAGS=""
          if [ "$TTS_PROVIDERS" = "gemini" ]; then
            SKIP_FLAGS="--skip-openai --skip-azure"
          fi
          python evaluate_tts.py --section "$TTS_SECTION" $SKIP_FLAGS --output-dir tts-eval

      - name: Upload audio artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tts-eval-${{ inputs.section }}-${{ inputs.providers }}
          path: tts-eval/
          retention-days: 14
          if-no-files-found: error
